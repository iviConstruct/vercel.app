<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ivi Construct</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
    color:white;
    background: radial-gradient(circle at top, #0b1220, #000);
    overflow-x:hidden;
}

body::before,body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    filter:blur(130px);
    z-index:-1;
}
body::before{background:#00c6ff;top:-150px;left:-150px;}
body::after{background:#7c3aed;bottom:-150px;right:-150px;}

.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    position:sticky;
    top:0;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
}

.nav a{color:white;text-decoration:none;margin-left:20px;opacity:0.7;}
.nav a:hover{opacity:1;}

.hero{
    height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero-box{
    padding:50px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(25px);
}

.btn{
    display:inline-block;
    padding:12px 18px;
    margin:6px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(90deg,#00c6ff,#7c3aed);
    cursor:pointer;
}

.section{
    padding:70px 20px;
    text-align:center;
}

.form-box{
    max-width:500px;
    margin:auto;
    padding:25px;
    border-radius:15px;
    background:rgba(255,255,255,0.06);
}

input,select,textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    outline:none;
}

textarea{height:100px;resize:none;}

.quick-buttons{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:15px;
}

.whatsapp-btn{
    background:#25D366;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:600;
}

.email-btn{
    background:#ff4d4d;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:600;
}

footer{
    text-align:center;
    padding:40px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="nav">
<b>ivi Construct</b>
<div>
<a href="#order">Comandă</a>
<a href="#contact">Contact</a>
</div>
</div>

<section class="hero">
<div class="hero-box">
<h1>ivi Construct</h1>
</div>
</section>

<section id="order" class="section">
<h2>Trimite cererea ta</h2>

<div class="form-box">

<input id="name" placeholder="Nume">
<input id="phone" placeholder="Telefon">

<select id="service">
<option>Tencuială</option>
<option>Șapă</option>
<option>Gresie</option>
<option>Glet</option>
<option>Vopsire</option>
<option>Renovare completă</option>
</select>

<input id="area" placeholder="Metri pătrați (ex: 120 m²)">
<textarea id="details" placeholder="Detalii lucrare"></textarea>

<div class="quick-buttons">
<a id="wa" class="whatsapp-btn" target="_blank">WhatsApp</a>
<a id="mail" class="email-btn">Email</a>
</div>

</div>
</section>

<footer>© ivi Construct</footer>

<script>
function buildMessage(){
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let service=document.getElementById('service').value;
let area=document.getElementById('area').value;
let details=document.getElementById('details').value;

return `Cerere:\nNume: ${name}\nTelefon: ${phone}\nServiciu: ${service}\nSuprafață: ${area}\nDetalii: ${details}`;
}

function updateLinks(){
let msg=buildMessage();

document.getElementById('wa').href=
`https://wa.me/40764843411?text=`+encodeURIComponent(msg);

document.getElementById('mail').href=
`mailto:vanyaburduzhan029@gmail.com?subject=Cerere&body=`+encodeURIComponent(msg);
}

setInterval(updateLinks,500);
</script>

</body>
</html>
